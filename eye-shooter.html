<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eye Shooter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Special Elite', monospace;
    color: #c8f0c0;
  }

  #ui {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 32px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
    z-index: 10;
    pointer-events: none;
  }

  #score-display {
    font-family: 'Creepster', cursive;
    font-size: 2.4rem;
    color: #7dff6b;
    text-shadow: 0 0 20px #3aff1a, 0 0 40px #1aff00;
    letter-spacing: 2px;
  }

  #lives-display {
    font-size: 1.2rem;
    color: #ff5555;
    text-shadow: 0 0 10px #ff0000;
  }

  #hint {
    position: fixed;
    bottom: 20px;
    font-size: 0.85rem;
    color: rgba(200,240,190,0.4);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  canvas {
    display: block;
    cursor: none;
  }

  #overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(5,5,10,0.92);
    z-index: 20;
    gap: 20px;
  }

  #overlay h1 {
    font-family: 'Creepster', cursive;
    font-size: 5rem;
    color: #7dff6b;
    text-shadow: 0 0 30px #3aff1a, 0 0 60px #00cc00;
    letter-spacing: 4px;
    animation: pulse 2s infinite;
  }

  #overlay p {
    font-size: 1.1rem;
    color: #a0d898;
    letter-spacing: 2px;
    text-align: center;
    line-height: 2;
    max-width: 500px;
  }

  #overlay .start-btn {
    margin-top: 20px;
    padding: 14px 48px;
    border: 2px solid #7dff6b;
    background: transparent;
    color: #7dff6b;
    font-family: 'Creepster', cursive;
    font-size: 1.8rem;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
    text-shadow: 0 0 10px #3aff1a;
    box-shadow: 0 0 20px rgba(125,255,107,0.2);
  }

  #overlay .start-btn:hover {
    background: rgba(125,255,107,0.15);
    box-shadow: 0 0 40px rgba(125,255,107,0.5);
    transform: scale(1.05);
  }

  #final-score {
    font-family: 'Creepster', cursive;
    font-size: 2rem;
    color: #ffcc00;
    text-shadow: 0 0 20px #ff9900;
  }

  @keyframes pulse {
    0%, 100% { text-shadow: 0 0 30px #3aff1a, 0 0 60px #00cc00; }
    50% { text-shadow: 0 0 50px #7dff6b, 0 0 100px #00ff00, 0 0 140px #00cc00; }
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="ui">
  <div id="score-display">SCORE: <span id="score">0</span></div>
  <div id="lives-display">❤️ <span id="lives">3</span></div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="hint">[ SPACEBAR ] to shoot when aligned</div>

<!-- Start / Game Over overlay -->
<div id="overlay">
  <h1 id="overlay-title">👁 EYE SHOOTER</h1>
  <p id="overlay-desc">
    The eye rotates its gaze across the screen.<br>
    Flies and mosquitos buzz around.<br>
    <strong>Hit SPACEBAR</strong> when the gaze beam hits an insect.<br>
    Miss 3 times and it's over.
  </p>
  <div id="final-score" class="hidden"></div>
  <button class="start-btn" onclick="startGame()">START</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const CX = canvas.width / 2;
const CY = canvas.height / 2;
const EYE_RX = 140;  // eye horizontal radius
const EYE_RY = 90;   // eye vertical radius

let score = 0;
let lives = 3;
let gameRunning = false;
let animId;

// Eye gaze angle (radians), rotates over time
let gazeAngle = 0;
let gazeSpeed = 0.012; // radians per frame
let gazeDir = 1;       // 1 or -1 for sweep direction

// Gaze beam length
const BEAM_LEN = Math.max(canvas.width, canvas.height);

// Visual effects
let particles = [];
let missFlash = 0;
let hitFlash = 0;
let lastShotTime = 0;

// Score popups
let popups = [];

// Insects array
let insects = [];

const INSECT_COUNT = 6;

// ─── INSECT CLASS ──────────────────────────────────────────────────────────
class Insect {
  constructor() {
    this.reset(true);
  }

  reset(initial = false) {
    this.type = Math.random() < 0.55 ? 'fly' : 'mosquito';

    // Spawn off-screen edge
    const edge = Math.floor(Math.random() * 4);
    const pad = 60;
    if (edge === 0) { this.x = Math.random() * canvas.width; this.y = -pad; }
    else if (edge === 1) { this.x = canvas.width + pad; this.y = Math.random() * canvas.height; }
    else if (edge === 2) { this.x = Math.random() * canvas.width; this.y = canvas.height + pad; }
    else { this.x = -pad; this.y = Math.random() * canvas.height; }

    if (initial) {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
    }

    const speed = this.type === 'fly' ? (1.4 + Math.random() * 1.2) : (0.9 + Math.random() * 0.8);
    const angle = Math.random() * Math.PI * 2;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;

    this.wingPhase = Math.random() * Math.PI * 2;
    this.wobble = 0;
    this.wobbleSpeed = 0.05 + Math.random() * 0.05;
    this.wobbleAmp = 0.3 + Math.random() * 0.4;
    this.alive = true;
    this.size = this.type === 'fly' ? (10 + Math.random() * 5) : (14 + Math.random() * 4);
    this.alpha = 1;
    this.dying = false;
    this.dyingTimer = 0;
    this.hit = false;

    // Random wander timer
    this.wanderTimer = 60 + Math.random() * 120;
  }

  update() {
    if (this.dying) {
      this.dyingTimer++;
      this.alpha = 1 - this.dyingTimer / 30;
      if (this.dyingTimer > 30) this.alive = false;
      return;
    }

    this.wingPhase += 0.35;
    this.wobble += this.wobbleSpeed;

    // Wander: randomly change direction
    this.wanderTimer--;
    if (this.wanderTimer <= 0) {
      const angle = Math.atan2(this.vy, this.vx) + (Math.random() - 0.5) * 1.5;
      const speed = Math.hypot(this.vx, this.vy);
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed;
      this.wanderTimer = 60 + Math.random() * 120;
    }

    // Avoid the eye center
    const dx = this.x - CX, dy = this.y - CY;
    const dist = Math.hypot(dx, dy);
    if (dist < 180) {
      const push = (180 - dist) / 180 * 0.4;
      this.vx += (dx / dist) * push;
      this.vy += (dy / dist) * push;
    }

    // Slight wobble perpendicular to motion
    const perpX = -this.vy / Math.hypot(this.vx, this.vy);
    const perpY = this.vx / Math.hypot(this.vx, this.vy);
    this.x += this.vx + perpX * Math.sin(this.wobble) * this.wobbleAmp;
    this.y += this.vy + perpY * Math.sin(this.wobble) * this.wobbleAmp;

    // Wrap if too far off screen
    const margin = 100;
    if (this.x < -margin || this.x > canvas.width + margin ||
        this.y < -margin || this.y > canvas.height + margin) {
      this.reset();
    }
  }

  // Returns angle from eye center to this insect
  angleFromCenter() {
    return Math.atan2(this.y - CY, this.x - CX);
  }

  // Angular difference from gaze
  angleDiff() {
    let diff = this.angleFromCenter() - gazeAngle;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    return Math.abs(diff);
  }

  isTargeted() {
    const dist = Math.hypot(this.x - CX, this.y - CY);
    return this.angleDiff() < 0.18 && dist > 160;
  }

  die() {
    this.dying = true;
    spawnParticles(this.x, this.y, this.type === 'fly' ? '#88ff44' : '#ff8844');
    popups.push({ x: this.x, y: this.y, text: this.type === 'fly' ? '+1' : '+2', timer: 0, color: '#ffff44' });
  }

  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.translate(this.x, this.y);

    const flyAngle = Math.atan2(this.vy, this.vx);
    ctx.rotate(flyAngle + Math.PI / 2);

    if (this.isTargeted() && !this.dying) {
      ctx.shadowColor = '#ff4444';
      ctx.shadowBlur = 20;
    }

    if (this.type === 'fly') {
      this.drawFly();
    } else {
      this.drawMosquito();
    }

    ctx.restore();
  }

  drawFly() {
    const s = this.size;
    const wingFlap = Math.sin(this.wingPhase) * 0.6;

    // Wings
    ctx.save();
    ctx.globalAlpha = (ctx.globalAlpha || 1) * 0.55;
    ctx.fillStyle = '#b8e8ff';
    ctx.strokeStyle = '#88ccff';
    ctx.lineWidth = 0.5;

    // Left wing
    ctx.save();
    ctx.rotate(-0.4 - wingFlap * 0.5);
    ctx.beginPath();
    ctx.ellipse(-s * 0.9, -s * 0.1, s * 1.1, s * 0.5, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    // Right wing
    ctx.save();
    ctx.rotate(0.4 + wingFlap * 0.5);
    ctx.beginPath();
    ctx.ellipse(s * 0.9, -s * 0.1, s * 1.1, s * 0.5, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.restore();
    ctx.restore();

    // Body
    ctx.fillStyle = '#2a2a1a';
    ctx.beginPath();
    ctx.ellipse(0, 0, s * 0.5, s * 0.8, 0, 0, Math.PI * 2);
    ctx.fill();

    // Abdomen stripes
    ctx.strokeStyle = '#4a4a2a';
    ctx.lineWidth = 1;
    for (let i = -1; i <= 2; i++) {
      ctx.beginPath();
      ctx.ellipse(0, i * s * 0.22, s * 0.48, s * 0.08, 0, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Eyes
    ctx.fillStyle = '#dd2200';
    ctx.beginPath();
    ctx.arc(-s * 0.18, -s * 0.65, s * 0.18, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(s * 0.18, -s * 0.65, s * 0.18, 0, Math.PI * 2);
    ctx.fill();

    // Legs
    ctx.strokeStyle = '#1a1a0a';
    ctx.lineWidth = 0.8;
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.moveTo(-s * 0.4, i * s * 0.2);
      ctx.lineTo(-s * 1.1, i * s * 0.2 + s * 0.3);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(s * 0.4, i * s * 0.2);
      ctx.lineTo(s * 1.1, i * s * 0.2 + s * 0.3);
      ctx.stroke();
    }
  }

  drawMosquito() {
    const s = this.size;
    const wingFlap = Math.sin(this.wingPhase) * 0.7;

    // Wings (more narrow)
    ctx.save();
    ctx.globalAlpha = (ctx.globalAlpha || 1) * 0.45;
    ctx.fillStyle = '#d4eeff';
    ctx.strokeStyle = '#99ccff';
    ctx.lineWidth = 0.5;

    ctx.save();
    ctx.rotate(-0.3 - wingFlap * 0.4);
    ctx.beginPath();
    ctx.ellipse(-s * 0.8, -s * 0.2, s * 1.3, s * 0.35, -0.2, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.rotate(0.3 + wingFlap * 0.4);
    ctx.beginPath();
    ctx.ellipse(s * 0.8, -s * 0.2, s * 1.3, s * 0.35, 0.2, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    ctx.restore();
    ctx.restore();

    // Abdomen (striped, elongated)
    ctx.fillStyle = '#1a2a10';
    ctx.beginPath();
    ctx.ellipse(0, s * 0.5, s * 0.3, s * 0.9, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#4a7a20';
    ctx.lineWidth = 0.8;
    for (let i = 0; i <= 3; i++) {
      ctx.beginPath();
      ctx.ellipse(0, s * (0.1 + i * 0.28), s * 0.28, s * 0.06, 0, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Thorax
    ctx.fillStyle = '#253518';
    ctx.beginPath();
    ctx.ellipse(0, -s * 0.2, s * 0.28, s * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();

    // Head
    ctx.fillStyle = '#1a2a10';
    ctx.beginPath();
    ctx.arc(0, -s * 0.65, s * 0.2, 0, Math.PI * 2);
    ctx.fill();

    // Proboscis
    ctx.strokeStyle = '#4a7a20';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, -s * 0.82);
    ctx.lineTo(0, -s * 1.5);
    ctx.stroke();

    // Legs (long and thin)
    ctx.strokeStyle = '#1a2a10';
    ctx.lineWidth = 0.6;
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.moveTo(-s * 0.25, i * s * 0.18 - s * 0.2);
      ctx.quadraticCurveTo(-s * 0.8, i * s * 0.1, -s * 1.3, i * s * 0.3 + s * 0.4);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(s * 0.25, i * s * 0.18 - s * 0.2);
      ctx.quadraticCurveTo(s * 0.8, i * s * 0.1, s * 1.3, i * s * 0.3 + s * 0.4);
      ctx.stroke();
    }
  }
}

// ─── PARTICLES ─────────────────────────────────────────────────────────────
function spawnParticles(x, y, color) {
  for (let i = 0; i < 18; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      color,
      size: 1.5 + Math.random() * 3,
      life: 1,
      decay: 0.03 + Math.random() * 0.04
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.93;
    p.vy *= 0.93;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ─── DRAW THE EYE ──────────────────────────────────────────────────────────
function drawEye() {
  const time = Date.now() / 1000;

  // Outer glow
  const glowGrad = ctx.createRadialGradient(CX, CY, EYE_RY * 0.5, CX, CY, EYE_RX * 2.2);
  glowGrad.addColorStop(0, 'rgba(60,200,40,0.08)');
  glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glowGrad;
  ctx.beginPath();
  ctx.ellipse(CX, CY, EYE_RX * 2.2, EYE_RY * 2.2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyelid shadow (top and bottom)
  const eyeClip = new Path2D();
  eyeClip.moveTo(CX - EYE_RX, CY);
  eyeClip.bezierCurveTo(CX - EYE_RX, CY - EYE_RY * 1.3, CX + EYE_RX, CY - EYE_RY * 1.3, CX + EYE_RX, CY);
  eyeClip.bezierCurveTo(CX + EYE_RX, CY + EYE_RY * 1.3, CX - EYE_RX, CY + EYE_RY * 1.3, CX - EYE_RX, CY);

  ctx.save();
  ctx.clip(eyeClip);

  // Sclera (whites)
  const scleraGrad = ctx.createRadialGradient(CX, CY, 0, CX, CY, EYE_RX);
  scleraGrad.addColorStop(0, '#f0f5ee');
  scleraGrad.addColorStop(0.6, '#d8e8d0');
  scleraGrad.addColorStop(1, '#b0c4a8');
  ctx.fillStyle = scleraGrad;
  ctx.fill(eyeClip);

  // Blood vessels
  ctx.strokeStyle = 'rgba(220,60,60,0.25)';
  ctx.lineWidth = 0.8;
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2 + time * 0.05;
    const startR = EYE_RY * 0.7;
    const endR = EYE_RX * 0.9;
    ctx.beginPath();
    ctx.moveTo(CX + Math.cos(angle) * startR * 0.5, CY + Math.sin(angle) * startR * 0.4);
    ctx.quadraticCurveTo(
      CX + Math.cos(angle + 0.3) * endR * 0.7,
      CY + Math.sin(angle + 0.3) * endR * 0.55,
      CX + Math.cos(angle + 0.1) * endR,
      CY + Math.sin(angle + 0.1) * endR * 0.75
    );
    ctx.stroke();
  }

  // Iris
  const irisR = 52;
  // Iris offset follows gaze angle
  const irisOffsetX = Math.cos(gazeAngle) * 18;
  const irisOffsetY = Math.sin(gazeAngle) * 12;
  const irisX = CX + irisOffsetX;
  const irisY = CY + irisOffsetY;

  const irisGrad = ctx.createRadialGradient(irisX - 8, irisY - 8, 2, irisX, irisY, irisR);
  irisGrad.addColorStop(0, '#88ee66');
  irisGrad.addColorStop(0.3, '#44aa22');
  irisGrad.addColorStop(0.7, '#228800');
  irisGrad.addColorStop(1, '#114400');
  ctx.fillStyle = irisGrad;
  ctx.beginPath();
  ctx.arc(irisX, irisY, irisR, 0, Math.PI * 2);
  ctx.fill();

  // Iris texture lines
  for (let i = 0; i < 24; i++) {
    const a = (i / 24) * Math.PI * 2;
    ctx.strokeStyle = `rgba(0,80,0,0.4)`;
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.moveTo(irisX + Math.cos(a) * 16, irisY + Math.sin(a) * 16);
    ctx.lineTo(irisX + Math.cos(a) * irisR * 0.95, irisY + Math.sin(a) * irisR * 0.95);
    ctx.stroke();
  }

  // Pupil
  const pupilR = 22;
  const pupilGrad = ctx.createRadialGradient(irisX - 4, irisY - 4, 0, irisX, irisY, pupilR);
  pupilGrad.addColorStop(0, '#111');
  pupilGrad.addColorStop(1, '#000');
  ctx.fillStyle = pupilGrad;
  ctx.beginPath();
  ctx.arc(irisX, irisY, pupilR, 0, Math.PI * 2);
  ctx.fill();

  // Corneal highlight
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath();
  ctx.ellipse(irisX - 12, irisY - 12, 8, 5, -0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.arc(irisX + 8, irisY + 8, 3, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  // Eyelid outlines
  ctx.strokeStyle = '#2a1a00';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(CX - EYE_RX, CY);
  ctx.bezierCurveTo(CX - EYE_RX, CY - EYE_RY * 1.3, CX + EYE_RX, CY - EYE_RY * 1.3, CX + EYE_RX, CY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(CX - EYE_RX, CY);
  ctx.bezierCurveTo(CX - EYE_RX, CY + EYE_RY * 1.3, CX + EYE_RX, CY + EYE_RY * 1.3, CX + EYE_RX, CY);
  ctx.stroke();

  // Eyelashes top
  ctx.strokeStyle = '#1a0a00';
  ctx.lineWidth = 2;
  for (let i = 0; i < 14; i++) {
    const t = (i / 13);
    const ex = CX - EYE_RX + t * EYE_RX * 2;
    const ey = CY - EYE_RY * 1.3 * Math.sin(Math.PI * t);
    const lashLen = 12 + Math.sin(Math.PI * t) * 6;
    ctx.beginPath();
    ctx.moveTo(ex, ey);
    ctx.lineTo(ex + (0.5 - t) * 8, ey - lashLen);
    ctx.stroke();
  }
}

// ─── DRAW GAZE BEAM ────────────────────────────────────────────────────────
function drawGazeBeam() {
  const anyTargeted = insects.some(ins => ins.isTargeted() && !ins.dying);

  // Beam from eye center along gaze angle
  const bx = CX + Math.cos(gazeAngle) * BEAM_LEN;
  const by = CY + Math.sin(gazeAngle) * BEAM_LEN;

  const grad = ctx.createLinearGradient(CX, CY, bx, by);
  if (anyTargeted) {
    grad.addColorStop(0, 'rgba(255,60,60,0.9)');
    grad.addColorStop(0.1, 'rgba(255,60,60,0.5)');
    grad.addColorStop(0.4, 'rgba(255,60,60,0.15)');
    grad.addColorStop(1, 'rgba(255,60,60,0)');
  } else {
    grad.addColorStop(0, 'rgba(120,255,80,0.7)');
    grad.addColorStop(0.08, 'rgba(120,255,80,0.35)');
    grad.addColorStop(0.35, 'rgba(120,255,80,0.08)');
    grad.addColorStop(1, 'rgba(120,255,80,0)');
  }

  ctx.save();
  ctx.lineWidth = anyTargeted ? 4 : 2.5;
  ctx.strokeStyle = grad;
  ctx.shadowColor = anyTargeted ? '#ff4444' : '#7dff6b';
  ctx.shadowBlur = anyTargeted ? 20 : 10;
  ctx.beginPath();
  ctx.moveTo(CX, CY);
  ctx.lineTo(bx, by);
  ctx.stroke();

  // Crosshair at end? No — small triangle indicator along beam
  const tipR = 160;
  const tipX = CX + Math.cos(gazeAngle) * tipR;
  const tipY = CY + Math.sin(gazeAngle) * tipR;
  ctx.fillStyle = anyTargeted ? 'rgba(255,80,80,0.8)' : 'rgba(120,255,80,0.6)';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(tipX, tipY, 4, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// ─── DRAW SCORE POPUPS ────────────────────────────────────────────────────
function drawPopups() {
  for (let i = popups.length - 1; i >= 0; i--) {
    const p = popups[i];
    p.timer++;
    const alpha = 1 - p.timer / 50;
    if (alpha <= 0) { popups.splice(i, 1); continue; }
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.font = 'bold 28px Creepster, monospace';
    ctx.textAlign = 'center';
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 12;
    ctx.fillText(p.text, p.x, p.y - p.timer * 1.2);
    ctx.restore();
  }
}

// ─── BACKGROUND ────────────────────────────────────────────────────────────
function drawBackground() {
  // Deep vignette bg
  const bg = ctx.createRadialGradient(CX, CY, 0, CX, CY, Math.max(canvas.width, canvas.height) * 0.8);
  bg.addColorStop(0, '#12180e');
  bg.addColorStop(0.5, '#0c120a');
  bg.addColorStop(1, '#040608');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Subtle grid
  ctx.strokeStyle = 'rgba(60,100,40,0.06)';
  ctx.lineWidth = 1;
  const gridSize = 60;
  for (let x = 0; x < canvas.width; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }

  if (missFlash > 0) {
    ctx.fillStyle = `rgba(255,0,0,${missFlash * 0.18})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    missFlash -= 0.06;
  }
  if (hitFlash > 0) {
    ctx.fillStyle = `rgba(120,255,60,${hitFlash * 0.12})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    hitFlash -= 0.07;
  }
}

// ─── SHOOT ─────────────────────────────────────────────────────────────────
function shoot() {
  if (!gameRunning) return;

  const now = Date.now();
  if (now - lastShotTime < 200) return; // debounce
  lastShotTime = now;

  let hit = false;
  for (const ins of insects) {
    if (ins.dying) continue;
    if (ins.isTargeted()) {
      ins.die();
      score += ins.type === 'mosquito' ? 2 : 1;
      document.getElementById('score').textContent = score;
      hitFlash = 1;
      hit = true;
    }
  }

  if (!hit) {
    lives--;
    document.getElementById('lives').textContent = lives;
    missFlash = 1;
    if (lives <= 0) endGame();
  }
}

// ─── GAME LOOP ─────────────────────────────────────────────────────────────
function gameLoop() {
  if (!gameRunning) return;

  // Update gaze angle — sweeps back and forth with occasional speed changes
  gazeAngle += gazeSpeed * gazeDir;

  // Occasionally flip direction for more natural movement
  if (Math.random() < 0.003) gazeDir *= -1;
  // Occasionally change speed
  if (Math.random() < 0.004) gazeSpeed = 0.008 + Math.random() * 0.018;

  // Ensure full rotation is possible sometimes
  if (Math.random() < 0.001) gazeDir = Math.sign(Math.random() - 0.5);

  // Update insects
  for (let i = insects.length - 1; i >= 0; i--) {
    insects[i].update();
    if (!insects[i].alive) {
      insects.splice(i, 1);
      // Spawn new one after a moment
      setTimeout(() => { if (gameRunning) insects.push(new Insect()); }, 800);
    }
  }

  updateParticles();

  // Draw
  drawBackground();
  drawGazeBeam();
  drawEye();

  for (const ins of insects) ins.draw();

  drawParticles();
  drawPopups();

  // Target indicator - pulsing circle on targeted insects
  for (const ins of insects) {
    if (ins.isTargeted() && !ins.dying) {
      const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 80);
      ctx.save();
      ctx.strokeStyle = `rgba(255,60,60,${0.6 + pulse * 0.4})`;
      ctx.lineWidth = 2;
      ctx.shadowColor = '#ff3333';
      ctx.shadowBlur = 15;
      ctx.setLineDash([4, 4]);
      ctx.lineDashOffset = -Date.now() / 30;
      ctx.beginPath();
      ctx.arc(ins.x, ins.y, ins.size * 2.5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
  }

  animId = requestAnimationFrame(gameLoop);
}

// ─── GAME START / END ──────────────────────────────────────────────────────
function startGame() {
  score = 0;
  lives = 3;
  gazeAngle = 0;
  gazeSpeed = 0.012;
  gazeDir = 1;
  particles = [];
  popups = [];
  insects = [];
  missFlash = 0;
  hitFlash = 0;

  document.getElementById('score').textContent = '0';
  document.getElementById('lives').textContent = '3';
  document.getElementById('overlay').classList.add('hidden');

  for (let i = 0; i < INSECT_COUNT; i++) insects.push(new Insect());

  gameRunning = true;
  gameLoop();
}

function endGame() {
  gameRunning = false;
  cancelAnimationFrame(animId);

  const overlay = document.getElementById('overlay');
  document.getElementById('overlay-title').textContent = '💀 GAME OVER';
  document.getElementById('overlay-desc').innerHTML = `Your reflexes were... <em>noted</em>.`;
  const fs = document.getElementById('final-score');
  fs.textContent = `FINAL SCORE: ${score}`;
  fs.classList.remove('hidden');
  document.querySelector('.start-btn').textContent = 'TRY AGAIN';
  overlay.classList.remove('hidden');
}

// ─── INPUT ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    shoot();
  }
});

// Touch support for mobile
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  shoot();
}, { passive: false });

// Draw a static eye on start for ambience
(function initDraw() {
  drawBackground();
  drawEye();
})();

</script>
</body>
</html>
